<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Extract text from a PDF document and download as a .txt file.">
  <title>PDF to Text – PDF Studio</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body data-tool="pdf-to-text">

  <header>
    <div class="container">
      <a href="/" class="logo" aria-label="PDF Studio – home">
        <div class="logo-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
        </div>
        <span class="logo-text">PDF<span class="logo-dot">.</span>Studio</span>
      </a>
      <a href="/" class="back-link">← All Tools</a>
      <a href="getting-started.html" class="back-link docs-link">📖 Docs</a>
    </div>
  </header>

  <main class="container">
    <div class="tool-page">

      <div class="steps-bar" aria-label="Progress" role="list">
        <div class="step active" role="listitem"><div class="step-num">1</div><span>Upload</span></div>
        <div class="step-connector"></div>
        <div class="step" role="listitem"><div class="step-num">2</div><span>Extract</span></div>
        <div class="step-connector"></div>
        <div class="step" role="listitem"><div class="step-num">3</div><span>Copy / Save</span></div>
      </div>

      <div class="tool-header fade-in">
        <div class="tool-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="8" y1="13" x2="16" y2="13"/>
            <line x1="8" y1="17" x2="16" y2="17"/>
          </svg>
        </div>
        <h1>PDF to Text</h1>
        <p class="tool-desc">Extract all text content from a PDF document.</p>
      </div>

      <div class="card fade-in">
        <form id="tool-form">

          <div class="upload-area" id="upload-area" role="button" tabindex="0" aria-label="Upload a PDF file">
            <div class="upload-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                <polyline points="16 16 12 12 8 16"/>
                <line x1="12" y1="12" x2="12" y2="21"/>
                <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
              </svg>
            </div>
            <p>Drag &amp; Drop your PDF here</p>
            <p class="upload-hint">or <span class="browse-link">click to browse</span></p>
            <input type="file" id="file-input" name="file" accept=".pdf">
          </div>

          <div id="file-info" class="file-info hidden" aria-live="polite"></div>

          <div class="divider"></div>

          <button type="submit" class="btn btn-primary btn-lg btn-block" id="submit-btn" disabled>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
            </svg>
            Extract Text
          </button>
        </form>

        <div id="progress-section" class="progress-section hidden">
          <div class="progress-dots" aria-hidden="true">
            <div class="progress-dot"></div>
            <div class="progress-dot"></div>
            <div class="progress-dot"></div>
          </div>
          <div class="progress-bar"><div class="progress-fill"></div></div>
          <p>Extracting text from PDF…</p>
        </div>

        <div id="result-section" class="result-section hidden">
          <div class="result-check">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <h3>Text extracted!</h3>
          <textarea id="extracted-text" rows="12"
                    style="width:100%;margin:16px 0;padding:12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:monospace;font-size:.85rem;resize:vertical;"
                    readonly aria-label="Extracted text"></textarea>
          <div class="result-actions">
            <button id="copy-btn" class="btn btn-primary btn-lg">📋 Copy Text</button>
            <button id="download-txt-btn" class="btn btn-success btn-lg">⬇️ Download .txt</button>
            <button class="btn btn-secondary" onclick="location.reload()">Extract Another</button>
          </div>
        </div>

        <div id="error-section" class="error-section hidden">
          <div class="error-badge">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
            <span id="error-message">An error occurred.</span>
          </div>
          <button class="btn btn-secondary" onclick="location.reload()">Try Again</button>
        </div>
      </div>

    </div>
  </main>

  <footer>
    <div class="container">
      <div class="footer-brand">
        <strong>PDF Studio</strong>
        <span>Privacy-First PDF Tools</span>
      </div>
      <div class="footer-badges">
        <span class="footer-badge">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          100% Private
        </span>
        <span class="footer-badge">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="20 6 9 17 4 12"/></svg>
          Self-Hosted
        </span>
      </div>
    </div>
  </footer>

  <script src="../js/app.js"></script>
  <script>
    document.getElementById('tool-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const form = document.getElementById('tool-form');
      const fileInput = form.querySelector('input[type="file"]');
      if (!fileInput.files.length) { showError('Please select a PDF file first.'); return; }

      showProgress();
      try {
        const formData = new FormData(form);
        const response = await fetch('/api/pdf-to-text', { method: 'POST', body: formData });
        if (!response.ok) {
          let msg = `Server error (${response.status})`;
          try { const j = await response.json(); msg = j.detail || msg; } catch(_) {}
          throw new Error(msg);
        }
        const data = await response.json();
        document.getElementById('extracted-text').value = data.text || '';
        document.getElementById('progress-section').classList.add('hidden');
        document.getElementById('result-section').classList.remove('hidden');
        document.getElementById('result-section').classList.add('fade-in');
        setStep(3);
      } catch (err) {
        showError(err.message || 'An unexpected error occurred.');
      }
    });

    document.getElementById('copy-btn').addEventListener('click', () => {
      const ta = document.getElementById('extracted-text');
      navigator.clipboard.writeText(ta.value).then(() => toast('Text copied to clipboard!', 'success'));
    });

    document.getElementById('download-txt-btn').addEventListener('click', () => {
      const text = document.getElementById('extracted-text').value;
      const blob = new Blob([text], { type: 'text/plain' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'extracted.txt';
      a.click();
    });
  </script>
</body>
</html>
