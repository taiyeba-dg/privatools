# PrivaTools production nginx config
# Target: Oracle VM (140.245.15.140), domain privatools.com
#
# Place this at /etc/nginx/sites-available/privatool and symlink into
# /etc/nginx/sites-enabled/. Reload with `nginx -t && systemctl reload nginx`.
#
# Assumptions:
#   - Certbot has populated /etc/letsencrypt/live/privatools.com/.
#   - The backend (uvicorn) is bound to 127.0.0.1:8000 via systemd.
#   - The built SPA is at /opt/privatool/frontend/dist.
#   - /opt/privatool/frontend/dist/assets contains hashed bundles.

# ---------------------------------------------------------------------------
# HTTP -> HTTPS redirect
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name privatools.com www.privatools.com;

    # ACME challenge passthrough for certbot renewal — keep this BEFORE
    # the catch-all redirect so http-01 challenges resolve without a
    # detour through 443.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# HTTPS — main site
# ---------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name privatools.com www.privatools.com;

    # Static root — built Vite SPA. nginx serves /assets/* directly; SPA
    # routes fall through to /index.html (see `try_files` below).
    root /opt/privatool/frontend/dist;
    index index.html;

    # --- TLS ----------------------------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/privatools.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/privatools.com/privkey.pem;

    # Mozilla "intermediate" profile (2024): TLS 1.2 + 1.3 only, strong
    # AEAD ciphers, no RC4/3DES/MD5.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    # OCSP stapling — reduces TLS handshake latency for first-time clients.
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # --- Body size + buffers ------------------------------------------------
    # 110 MB lines up with backend MAX_UPLOAD_MB=100 plus form overhead.
    client_max_body_size 110m;
    client_body_buffer_size 1m;

    # --- Security headers ---------------------------------------------------
    # HSTS — preload-ready. Once submitted to hstspreload.org this can never
    # be undone for ~6 months without painful preload removal, so confirm
    # privatools.com really wants 2-year HTTPS-only before pushing preload.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # CSP — `script-src 'unsafe-inline'` is regrettable. Vite's runtime
    # hydration ships an inline bootstrap, and removing it requires moving
    # to nonces, which Vite doesn't emit without a custom build plugin.
    # FOLLOW-UP: introduce a nonce-injecting middleware so we can drop
    # 'unsafe-inline' from script-src without breaking the SPA.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' blob: data:; font-src 'self' data:; connect-src 'self'; frame-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'" always;

    server_tokens off;

    # --- gzip ---------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/html
        application/javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        application/manifest+json
        image/svg+xml
        font/woff
        font/woff2;

    # --- brotli (optional) --------------------------------------------------
    # Enable only if the ngx_brotli module is compiled in. Stock Ubuntu
    # nginx-full does NOT ship it; install `libnginx-mod-brotli` or
    # compile from source first, then uncomment.
    # brotli on;
    # brotli_comp_level 5;
    # brotli_types
    #     text/plain
    #     text/css
    #     text/xml
    #     text/html
    #     application/javascript
    #     application/json
    #     application/xml
    #     application/manifest+json
    #     image/svg+xml
    #     font/woff
    #     font/woff2;

    # --- Cache strategy -----------------------------------------------------
    # Hashed assets (Vite emits filename-hash-extension) are content-addressed
    # so they're safe to cache forever.
    location ^~ /assets/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        # Re-apply security headers — nginx replaces, not merges, the
        # add_header set when a nested block adds its own. Without this
        # the immutable assets would lose HSTS/X-Frame/etc.
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # Service worker must never cache — otherwise users get stuck on a
    # stale SW that holds the old shell.
    location = /sw.js {
        add_header Cache-Control "no-store" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # SEO/PWA metadata — short cache so updates roll out within an hour
    # without hammering origin.
    location = /manifest.json {
        add_header Cache-Control "public, max-age=3600" always;
        try_files $uri =404;
    }
    location = /robots.txt {
        add_header Cache-Control "public, max-age=3600" always;
        try_files $uri =404;
    }
    location = /sitemap.xml {
        # Backend renders sitemap dynamically — proxy to the FastAPI handler.
        add_header Cache-Control "public, max-age=3600" always;
        proxy_pass http://127.0.0.1:8000/sitemap.xml;
        proxy_set_header Host $host;
    }

    # --- API proxy ----------------------------------------------------------
    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        # Large multipart uploads — must match server-level setting.
        client_max_body_size 110m;
        # Disable buffering of streamed downloads (compressed PDFs etc.)
        # so the browser starts receiving bytes the moment the backend
        # emits them.
        proxy_buffering off;
    }

    # --- Health proxy -------------------------------------------------------
    location = /healthz {
        access_log off;
        proxy_pass http://127.0.0.1:8000/healthz;
        proxy_set_header Host $host;
    }

    location = /readyz {
        access_log off;
        proxy_pass http://127.0.0.1:8000/readyz;
        proxy_set_header Host $host;
    }

    # --- SPA fallback -------------------------------------------------------
    # Last resort: any unmatched path serves index.html so client-side
    # routing handles the URL. HTML itself must revalidate so deploys
    # propagate within seconds.
    location / {
        add_header Cache-Control "no-cache, must-revalidate" always;
        # Re-apply security headers — same reason as the /assets/ block.
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' blob: data:; font-src 'self' data:; connect-src 'self'; frame-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'" always;
        try_files $uri /index.html;
    }
}
