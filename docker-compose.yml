version: '3.8'

services:
  privatools:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - app-temp:/app/temp
    environment:
      - PORT=8000
      - ENVIRONMENT=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  app-temp:
